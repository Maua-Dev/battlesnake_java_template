name: CD with Terraform

on:
  push:
    branches:
      - dev

jobs:
  DeployToAwsWithTerraform:

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_CLOUD_ORGANIZATION: "DevCoisas"
      TFC_WORKSPACE_NAME: "BattleSnake"
    
    environment:
      name: ${{ github.ref_name }}

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 (includes Maven)
        uses: actions/setup-java@v4
        with:
            distribution: 'temurin'
            java-version: '17'
            cache: 'maven'

      - name: Build Java project with Maven
        run: cd .. && mvn clean package

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GithubActionsRole
          role-session-name: github-action-terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Determine and Select Terraform Workspace
        id: workspace
        run: |
          REPO_NAME=${{ github.event.repository.name }}

          echo "Project name is: $REPO_NAME"
          
          echo "name=$REPO_NAME" >> "$GITHUB_ENV"

      - name: Terraform Init
        run: terraform init

      - name: Configure and Create Terraform Workspace
        run: |
          terraform workspace select ${{ env.REPO_NAME }}  || terraform workspace new ${{ env.REPO_NAME }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve